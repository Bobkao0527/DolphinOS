<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DolphinOS v5.1 - 雲端卸載同步核心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --theme-color: 0, 191, 255; --theme-color-hex: #00bfff; }
        body { font-family: 'Inter', sans-serif; background: #02040a; color: #e2e8f0; overflow: hidden; user-select: none; }
        .tech-mono { font-family: 'Share Tech Mono', monospace; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glassmorphism { background: rgba(10, 15, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glassmorphism-dark { background: rgba(5, 7, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-grid { background-size: 50px 50px; background-image: linear-gradient(to right, rgba(0, 191, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 191, 255, 0.03) 1px, transparent 1px); }
        .scanline::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 9999; pointer-events: none; }
        .resize-handle { position: absolute; width: 12px; height: 12px; right: 0; bottom: 0; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, var(--theme-color-hex) 50%); }
        .glow-theme { box-shadow: 0 0 20px rgba(var(--theme-color), 0.2); border: 1px solid rgba(var(--theme-color), 0.4); }
        iframe { background-color: white; border-radius: 0 0 1.5rem 1.5rem; transition: opacity 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .app-window { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-active { background: rgba(var(--theme-color), 0.2) !important; color: var(--theme-color-hex) !important; border-color: rgba(var(--theme-color), 0.4) !important; }
        
        /* 刪除按鈕樣式 */
        .delete-btn { opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }
        .desktop-app-wrapper:hover .delete-btn { opacity: 1; transform: scale(1); }
    </style>
</head>
<body class="bg-grid scanline relative h-screen w-screen overflow-hidden">

    <!-- 系統遮罩層 -->
    <div id="system-overlay" class="fixed inset-0 bg-[#020208] z-[99999] flex flex-col items-center justify-center transition-all duration-1000">
        <div id="boot-loader" class="text-center">
            <div class="mb-6 relative flex items-center justify-center">
                <div class="w-24 h-24 rounded-full border border-cyan-500/30 animate-spin"></div>
                <i class="fa-solid fa-dharmachakra text-4xl text-cyan-400 absolute animate-pulse"></i>
            </div>
            <h1 class="orbitron text-3xl font-black tracking-[0.5em] text-white">DOLPHIN <span class="text-cyan-400">OS</span></h1>
            <p class="tech-mono text-cyan-700 text-[10px] mt-2 tracking-widest uppercase">系統核心載入中 v5.1 PRO...</p>
        </div>

        <div id="auth-window" class="hidden glassmorphism-dark p-10 rounded-[3rem] border border-white/10 w-[420px] shadow-2xl flex flex-col items-center">
            <div id="auth-avatar-box" class="w-24 h-24 rounded-full bg-white/5 border-2 border-cyan-500/30 mb-6 overflow-hidden flex items-center justify-center">
                <img id="auth-avatar-img" src="" class="w-full h-full object-cover hidden">
                <i id="auth-avatar-icon" class="fa-solid fa-user-ninja text-3xl text-cyan-500"></i>
            </div>
            <h2 id="auth-title" class="orbitron text-white text-lg font-bold tracking-[0.3em] mb-8 uppercase">系統安全驗證</h2>
            <div class="w-full space-y-4">
                <input type="text" id="auth-username" placeholder="使用者名稱" class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-6 text-xs tech-mono outline-none focus:border-cyan-500/50">
                <input type="password" id="auth-password" placeholder="存取密碼" class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-6 text-xs tech-mono outline-none focus:border-cyan-500/50">
                <div id="reg-avatar-input" class="hidden"><input type="text" id="auth-avatar-url" placeholder="頭像圖片網址 (選填)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-6 text-xs tech-mono outline-none focus:border-cyan-500/50"></div>
                <button onclick="submitAuth()" class="w-full py-4 bg-cyan-500 text-black orbitron font-black text-xs rounded-2xl hover:bg-cyan-400 shadow-lg transition-all uppercase">進入核心</button>
                <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full text-[9px] tech-mono text-cyan-600 hover:text-cyan-400 text-center">建立新身分帳號 (REG_IDENTITY)</button>
            </div>
            <p id="auth-error" class="text-red-500 text-[10px] tech-mono mt-4 opacity-0 transition-opacity"></p>
        </div>
    </div>

    <!-- 頂部狀態列 -->
    <div class="absolute top-0 left-0 right-0 h-10 glassmorphism border-b border-white/5 px-6 flex items-center justify-between z-50">
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2 text-cyan-400 cursor-pointer" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered text-sm"></i><span class="orbitron font-bold text-[10px] tracking-widest uppercase">Dolphin_OS</span></div>
        </div>
        <div class="orbitron text-[11px] font-medium tracking-widest text-slate-200"><span id="top-clock">00:00:00</span></div>
        <div class="flex items-center space-x-4">
            <span id="top-user-name" class="tech-mono text-[10px] text-slate-300">USER</span>
            <img id="top-user-avatar" src="" class="w-6 h-6 rounded-full bg-white/5 hidden border border-white/20">
        </div>
    </div>

    <!-- 桌面圖示 -->
    <div id="desktop-icons" class="absolute inset-0 pt-16 px-8 pb-24 grid grid-flow-row auto-rows-max grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-12 gap-8 z-10 overflow-y-auto no-scrollbar">
        <div onclick="openWindow('appstore')" class="flex flex-col items-center group cursor-pointer w-20">
            <div class="w-14 h-14 rounded-2xl glassmorphism flex items-center justify-center border border-white/10 group-hover:border-cyan-500/50 shadow-xl transition-all"><i data-lucide="shopping-bag" class="w-6 h-6 text-cyan-400"></i></div>
            <span class="text-[10px] font-semibold text-slate-300 mt-2 text-center tech-mono uppercase">應用中心</span>
        </div>
        <div onclick="openWindow('settings')" class="flex flex-col items-center group cursor-pointer w-20">
            <div class="w-14 h-14 rounded-2xl glassmorphism flex items-center justify-center border border-white/10 group-hover:border-purple-500/50 shadow-xl transition-all"><i data-lucide="settings" class="w-6 h-6 text-purple-400"></i></div>
            <span class="text-[10px] font-semibold text-slate-300 mt-2 text-center tech-mono uppercase">系統設定</span>
        </div>
    </div>

    <div id="windows-container" class="absolute inset-0 z-20 pointer-events-none"></div>

    <!-- 底部列 -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 h-14 px-4 glassmorphism rounded-2xl flex items-center space-x-2 z-50 glow-theme">
        <button onclick="toggleMenu()" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-cyan-500/20 flex items-center justify-center transition-all"><i class="fa-solid fa-compass text-cyan-400 text-sm"></i></button>
        <div class="h-6 w-[1px] bg-white/10 mx-2"></div>
        <div id="taskbar-apps" class="flex items-center space-x-2"></div>
    </div>

    <!-- 開始選單 -->
    <div id="start-menu" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[400px] glassmorphism-dark rounded-3xl z-50 border border-white/10 p-6 hidden opacity-0 translate-y-10 transition-all duration-300">
        <div class="flex items-center space-x-4 mb-8">
            <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center shadow-lg overflow-hidden">
                <img id="start-user-avatar" src="" class="w-full h-full object-cover hidden">
                <i id="start-user-icon" class="fa-solid fa-user-secret text-white"></i>
            </div>
            <div><h3 id="start-user-name" class="orbitron text-xs font-black text-white tracking-widest uppercase">GUEST</h3><p class="tech-mono text-[9px] text-emerald-500 uppercase">狀態：身分資料已同步</p></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="openWindow('appstore'); toggleMenu();" class="flex flex-col items-center p-4 rounded-2xl hover:bg-white/5 group"><i data-lucide="shopping-bag" class="w-5 h-5 text-cyan-400"></i><span class="text-[9px] tech-mono mt-2 text-slate-400 uppercase">商店</span></button>
            <button onclick="openWindow('settings'); toggleMenu();" class="flex flex-col items-center p-4 rounded-2xl hover:bg-white/5 group"><i data-lucide="settings" class="w-5 h-5 text-purple-400"></i><span class="text-[9px] tech-mono mt-2 text-slate-400 uppercase">設定</span></button>
        </div>
        <button onclick="location.reload()" class="w-full py-3 rounded-xl bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[9px] orbitron font-bold">登出系統並重啟</button>
    </div>

    <div id="toast-container" class="fixed top-14 right-6 z-[9999] flex flex-col space-y-3 pointer-events-none"></div>

    <script>
        const CLOUDFLARE_PROXY = "https://dolphiniframe.bobkao0527.workers.dev/?url="; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwmgtIHKFg7opo5-4Pgubnfu4N7i_cELEx3K54FtSCB5z5rt8OwNmhIheLEukfko6VTLA/exec";
        const USER_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYcqaa4NHO0pmFAHqfHbXkWArQ1HeiTXyiyNHB2MIdLPqQN9mPRQjzeSCTehDtLEpdnZyiaPhURog9/pub?output=csv";
        const APPS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRaOpCxuqlnhoWQLRPONkb_x_zh7SsgA0gsLkmiDcrhvY_SBZWPeG8-Dz7oxGkrDS3eI9OTt0cAh6v9/pub?output=csv";

        let currentUser = null, cloudApps = [], userDatabase = [], openApps = {}, zIndex = 100, isRegisterMode = false, activeCategory = '全部';

        window.onload = async () => { lucide.createIcons(); updateClock(); await fetchCloudData(); document.getElementById('boot-loader').classList.add('hidden'); document.getElementById('auth-window').classList.remove('hidden'); };

        async function fetchCloudData() {
            try {
                const [aRes, uRes] = await Promise.all([fetch(APPS_CSV), fetch(USER_CSV)]);
                const [aText, uText] = await Promise.all([aRes.text(), uRes.text()]);
                cloudApps = aText.split('\n').slice(1).map(l => { const p = l.split(','); return { cat: p[0], name: p[1], url: p[2], thumb: p[3], dev: p[4], id: p[5]?.trim(), proxy: p[6]?.trim() }; });
                userDatabase = uText.split('\n').slice(1).map(l => { const p = l.split(','); return { name: p[0], pass: p[1], avatar: p[2], apps: p[3]?.split('@').filter(x => x) || [], theme: p[4]?.trim() || 'cyan' }; });
            } catch (e) { console.error("同步失敗", e); }
        }

        function toggleAuthMode() { isRegisterMode = !isRegisterMode; document.getElementById('auth-title').innerText = isRegisterMode ? "身分註冊系統" : "系統安全驗證"; document.getElementById('reg-avatar-input').classList.toggle('hidden', !isRegisterMode); }

        async function submitAuth() {
            const u = document.getElementById('auth-username').value, p = document.getElementById('auth-password').value, a = document.getElementById('auth-avatar-url').value;
            if(!u || !p) return;
            if(isRegisterMode) { await syncToGAS(u, p, a, "", "cyan"); showToast("系統", "身分註冊成功，請登入。"); toggleAuthMode(); }
            else { 
                const user = userDatabase.find(x => x.name === u && x.pass === p);
                if(user) { currentUser = user; enterSystem(); }
                else { document.getElementById('auth-error').innerText = "驗證失敗，請檢查資料。"; document.getElementById('auth-error').style.opacity = '1'; }
            }
        }

        function enterSystem() {
            document.getElementById('top-user-name').innerText = currentUser.name; document.getElementById('start-user-name').innerText = currentUser.name; setSystemTheme(currentUser.theme);
            if(currentUser.avatar) { document.getElementById('top-user-avatar').src = currentUser.avatar; document.getElementById('top-user-avatar').classList.remove('hidden'); document.getElementById('start-user-avatar').src = currentUser.avatar; document.getElementById('start-user-avatar').classList.remove('hidden'); document.getElementById('start-user-icon').classList.add('hidden'); }
            document.getElementById('system-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('system-overlay').remove(), 1000);
            renderInstalled(); showToast("DolphinOS", "量子通訊已建立，歡迎回來。");
        }

        async function syncToGAS(n, p, a, apps, t) { try { await fetch(GAS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: n, password: p, avatar: a, installedApps: apps, theme: t }) }); } catch (e) {} }
        async function saveCurrentState() { if(!currentUser) return; await syncToGAS(currentUser.name, currentUser.pass, currentUser.avatar, currentUser.apps.join('@'), currentUser.theme); }

        // --- 視窗管理核心 ---
        function openWindow(id, customApp = null) {
            if(openApps[id]) { focusWindow(id); return; }
            const app = customApp || (id === 'appstore' ? { name: "應用中心" } : { name: "系統設定" });
            const win = document.createElement('div');
            win.id = `win-${id}`;
            win.className = `absolute app-window glassmorphism-dark rounded-3xl overflow-hidden border border-white/10 pointer-events-auto flex flex-col shadow-2xl`;
            win.style.width = '900px'; win.style.height = '600px'; win.style.left = '150px'; win.style.top = '80px';
            win.style.zIndex = ++zIndex;
            win.onmousedown = () => focusWindow(id);

            let headerBtns = `<div class="flex items-center">`;
            if(app.url) {
                headerBtns += `<button onclick="refreshIframe('${id}', '${app.id}')" class="text-[9px] px-2 py-1 bg-white/5 hover:bg-white/10 rounded border border-white/10 mr-2"><i class="fa-solid fa-rotate-right"></i></button>`;
                headerBtns += `<button onclick="window.open('${app.url}', '_blank')" class="text-[9px] px-2 py-1 bg-white/5 hover:bg-cyan-500/20 rounded border border-white/10 mr-4">外部開啟</button>`;
            }
            headerBtns += `<div onclick="closeWindow('${id}')" class="w-3 h-3 rounded-full bg-red-500 border border-red-500/40 cursor-pointer transition-all"></div></div>`;

            win.innerHTML = `<div class="h-12 border-b border-white/5 flex items-center justify-between px-6 cursor-move select-none" onmousedown="dragWin(event, '${id}')"><span class="tech-mono text-[10px] font-bold text-cyan-400 tracking-widest uppercase">${app.name}</span>${headerBtns}</div><div class="flex-1 overflow-hidden relative" id="body-${id}"></div><div class="resize-handle" onmousedown="resizeWin(event, '${id}')"></div>`;
            document.getElementById('windows-container').appendChild(win);
            openApps[id] = { el: win, data: app };
            if(app.url) loadIframe(id, app);
            else { const temp = document.getElementById(`app-template-${id}`); if(temp) { const clone = temp.cloneNode(true); clone.classList.remove('hidden'); document.getElementById(`body-${id}`).appendChild(clone); if(id==='appstore')renderAppStore(); if(id==='settings')switchTab('info'); } }
            focusWindow(id);
        }

        function loadIframe(id, app) {
            const b = document.getElementById(`body-${id}`);
            let finalUrl = app.url;
            if (finalUrl.includes('youtube.com/watch?v=')) { const vid = finalUrl.split('v=')[1].split('&')[0]; finalUrl = `https://www.youtube.com/embed/${vid}?autoplay=1`; }
            else if (finalUrl.includes('youtu.be/')) { const vid = finalUrl.split('be/')[1].split('?')[0]; finalUrl = `https://www.youtube.com/embed/${vid}?autoplay=1`; } 
            else if (app.proxy === 'T') { finalUrl = CLOUDFLARE_PROXY + encodeURIComponent(finalUrl); }
            b.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center bg-black text-slate-500" id="loader-${id}"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-cyan-400 mb-2"></div><span class="text-[9px] tech-mono uppercase">連線載入中...</span></div><iframe src="${finalUrl}" class="w-full h-full border-none" onload="document.getElementById('loader-${id}').remove()"></iframe>`;
        }

        function refreshIframe(winId, appId) { const app = (appId === 'appstore' || appId === 'settings') ? null : cloudApps.find(x => x.id === appId); if(app) loadIframe(winId, app); else location.reload(); }
        function focusWindow(id) { Object.values(openApps).forEach(a => a.el.style.borderColor = 'rgba(255,255,255,0.05)'); openApps[id].el.style.zIndex = ++zIndex; openApps[id].el.style.borderColor = 'rgba(var(--theme-color), 0.3)'; }
        function closeWindow(id) { openApps[id].el.remove(); delete openApps[id]; }
        function dragWin(e, id) { const w = openApps[id].el; const sX=e.clientX-w.offsetLeft, sY=e.clientY-w.offsetTop; document.onmousemove=(ev)=>{w.style.left=(ev.clientX-sX)+'px';w.style.top=(ev.clientY-sY)+'px'}; document.onmouseup=()=>document.onmousemove=null; }
        function resizeWin(e, id) { e.stopPropagation(); const w = openApps[id].el; const sW=w.offsetWidth, sH=w.offsetHeight, sX=e.clientX, sY=e.clientY; document.onmousemove=(ev)=>{w.style.width=(sW+(ev.clientX-sX))+'px';w.style.height=(sH+(ev.clientY-sY))+'px'}; document.onmouseup=()=>document.onmousemove=null; }

        // --- 核心：App 安裝與卸載邏輯 ---
        function renderAppStore() {
            const grid = document.getElementById('appstore-grid'); if(!grid) return;
            const search = document.getElementById('store-search').value.toLowerCase();
            const tabs = document.getElementById('store-category-tabs');
            const cats = ['全部', ...new Set(cloudApps.map(a => a.cat))];
            tabs.innerHTML = cats.map(c => `<button onclick="activeCategory='${c}'; renderAppStore();" class="px-3 py-1 rounded-lg text-[9px] tech-mono ${activeCategory===c?'bg-cyan-500/20 text-cyan-400 border border-cyan-500/30':'text-slate-500'}">${c}</button>`).join('');
            
            grid.innerHTML = cloudApps.filter(a => (activeCategory==='全部' || a.cat===activeCategory) && a.name.toLowerCase().includes(search)).map(a => {
                const isInstalled = currentUser.apps.includes(a.id);
                return `<div class="bg-white/5 border border-white/5 p-4 rounded-2xl flex flex-col items-center group transition-all">
                    <img src="${a.thumb}" class="w-16 h-16 rounded-xl object-cover mb-4">
                    <h4 class="text-xs font-bold text-white mb-1 tech-mono uppercase">${a.name}</h4>
                    <p class="text-[9px] text-slate-500 mb-2">ID: ${a.id}</p>
                    ${isInstalled 
                        ? `<button onclick="uninstallApp('${a.id}')" class="w-full py-2 bg-red-500/10 border border-red-500/20 rounded-xl text-[10px] text-red-500 font-bold hover:bg-red-500 hover:text-white mt-2 transition-all">卸載移除</button>`
                        : `<button onclick="installApp('${a.id}')" class="w-full py-2 bg-cyan-500/10 border border-cyan-500/20 rounded-xl text-[10px] text-cyan-400 font-bold hover:bg-cyan-500 hover:text-black mt-2 transition-all">部署安裝</button>`
                    }
                </div>`;
            }).join('');
        }

        async function installApp(id) {
            if(currentUser.apps.includes(id)) return;
            currentUser.apps.push(id);
            renderInstalled();
            renderAppStore(); // 更新商店按鈕
            await saveCurrentState();
            showToast("系統通知", "App 部署成功。");
        }

        async function uninstallApp(id) {
            currentUser.apps = currentUser.apps.filter(appId => appId !== id);
            renderInstalled();
            renderAppStore(); // 更新商店按鈕
            await saveCurrentState();
            showToast("系統通知", "App 已從雲端節點移除。");
        }

        function renderInstalled() {
            const d = document.getElementById('desktop-icons');
            d.querySelectorAll('.installed-app-wrapper').forEach(e => e.remove());
            currentUser.apps.forEach(id => {
                const a = cloudApps.find(x => x.id === id); if(!a) return;
                const div = document.createElement('div');
                div.className = "desktop-app-wrapper flex flex-col items-center group cursor-pointer w-20 relative installed-app-wrapper";
                div.innerHTML = `
                    <div class="delete-btn absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full flex items-center justify-center z-20 shadow-lg hover:bg-red-600" onclick="event.stopPropagation(); uninstallApp('${a.id}')">
                        <i class="fa-solid fa-xmark text-[10px]"></i>
                    </div>
                    <div class="w-14 h-14 rounded-2xl glassmorphism flex items-center justify-center border border-white/10 group-hover:border-cyan-500/50 shadow-xl overflow-hidden z-10" onclick="openWindow('${a.id}', ${JSON.stringify(a).replace(/"/g, '&quot;')})">
                        <img src="${a.thumb}" class="w-full h-full object-cover">
                    </div>
                    <span class="text-[10px] text-slate-300 mt-2 tech-mono truncate w-full text-center px-1 uppercase">${a.name}</span>
                `;
                d.appendChild(div);
            });
        }

        function switchTab(t) {
            const m = document.getElementById('settings-main');
            const sidebar = document.getElementById('settings-sidebar');
            sidebar.querySelectorAll('button').forEach(b => b.classList.remove('btn-active'));
            event.currentTarget.classList.add('btn-active');
            if(t === 'info') m.innerHTML = `<h3 class="orbitron text-xs font-bold text-cyan-400 mb-6 uppercase">系統核心資訊</h3><div class="grid grid-cols-2 gap-4 tech-mono text-[10px]"><div class="bg-white/5 p-4 rounded-xl border border-white/5"><p class="text-slate-500">系統版本</p><p>Dolphin v5.1 PRO</p></div><div class="bg-white/5 p-4 rounded-xl border border-white/5"><p class="text-slate-500">雲端核心</p><p class="text-emerald-400">SYNC_ON</p></div></div>`;
            else if(t === 'appearance') m.innerHTML = `<h3 class="orbitron text-xs font-bold text-cyan-400 mb-6 uppercase">配色偏好設定</h3><div class="grid grid-cols-2 gap-4"><button onclick="updateTheme('cyan')" class="p-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-cyan-500/10 tech-mono text-[10px] flex justify-between">霓虹藍 <div class="w-3 h-3 rounded-full bg-[#00bfff]"></div></button><button onclick="updateTheme('emerald')" class="p-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-emerald-500/10 tech-mono text-[10px] flex justify-between">極光綠 <div class="w-3 h-3 rounded-full bg-[#10b981]"></div></button><button onclick="updateTheme('purple')" class="p-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-purple-500/10 tech-mono text-[10px] flex justify-between">密碼紫 <div class="w-3 h-3 rounded-full bg-[#a853f7]"></div></button><button onclick="updateTheme('red')" class="p-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-red-500/10 tech-mono text-[10px] flex justify-between">火岩紅 <div class="w-3 h-3 rounded-full bg-[#ef4444]"></div></button></div>`;
            else if(t === 'profile') m.innerHTML = `<h3 class="orbitron text-xs font-bold text-cyan-400 mb-6 uppercase">身分帳號管理</h3><div class="space-y-4"><div class="flex flex-col"><label class="text-[9px] text-slate-500 tech-mono mb-1 uppercase">使用者名稱</label><input type="text" id="edit-username" value="${currentUser.name}" class="bg-white/5 border border-white/10 rounded-xl p-3 text-xs tech-mono outline-none focus:border-cyan-500"></div><div class="flex flex-col"><label class="text-[9px] text-slate-500 tech-mono mb-1 uppercase">新存取密碼</label><input type="password" id="edit-password" value="${currentUser.pass}" class="bg-white/5 border border-white/10 rounded-xl p-3 text-xs tech-mono outline-none focus:border-cyan-500"></div><div class="flex flex-col"><label class="text-[9px] text-slate-500 tech-mono mb-1 uppercase">頭像 URL</label><input type="text" id="edit-avatar" value="${currentUser.avatar}" class="bg-white/5 border border-white/10 rounded-xl p-3 text-xs tech-mono outline-none focus:border-cyan-500"></div><button onclick="updateProfile()" class="w-full py-3 bg-cyan-500 text-black orbitron font-black text-[10px] rounded-xl hover:bg-cyan-400 uppercase transition-all">更新雲端檔案</button></div>`;
        }
        async function updateTheme(c) { currentUser.theme = c; setSystemTheme(c); await saveCurrentState(); showToast("外觀設定", "主題色已同步。"); }
        async function updateProfile() { currentUser.name = document.getElementById('edit-username').value; currentUser.pass = document.getElementById('edit-password').value; currentUser.avatar = document.getElementById('edit-avatar').value; await saveCurrentState(); location.reload(); }

        function updateClock() { setInterval(() => { document.getElementById('top-clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000); }
        function setSystemTheme(c) { 
            let r, h; if(c==='emerald'){r='16,185,129';h='#10b981'}else if(c==='purple'){r='168,85,247';h='#a853f7'}else if(c==='red'){r='239,68,68';h='#ef4444'}else{r='0,191,255';h='#00bfff';c='cyan'} 
            document.documentElement.style.setProperty('--theme-color',r); document.documentElement.style.setProperty('--theme-color-hex',h); 
        }
        function toggleMenu() { const m = document.getElementById('start-menu'); if(m.classList.contains('hidden')){ m.classList.remove('hidden'); setTimeout(()=>m.classList.remove('opacity-0','translate-y-10'),10); } else { m.classList.add('opacity-0','translate-y-10'); setTimeout(()=>m.classList.add('hidden'),300); } }
        function showToast(title, desc) { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = "w-64 p-4 glassmorphism rounded-2xl border-l-4 border-cyan-400 transform translate-x-full transition-all duration-500 pointer-events-auto shadow-2xl"; t.innerHTML = `<h4 class="orbitron text-[9px] text-white font-bold mb-1 uppercase">${title}</h4><p class="tech-mono text-[8px] text-slate-400 uppercase">${desc}</p>`; c.appendChild(t); setTimeout(()=>t.classList.remove('translate-x-full'),10); setTimeout(()=>{ t.classList.add('translate-x-full'); setTimeout(()=>t.remove(),500); }, 4000); }
    </script>

    <!-- 系統 App 模板 -->
    <div id="app-template-appstore" class="hidden h-full flex flex-col bg-[#02040a] text-slate-200">
        <div class="p-6 border-b border-white/5 flex items-center justify-between"><div class="relative w-64"><i data-lucide="search" class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2"></i><input type="text" id="store-search" oninput="renderAppStore()" placeholder="搜尋雲端程式..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-[10px] tech-mono outline-none"></div><div id="store-category-tabs" class="flex space-x-2"></div></div>
        <div class="flex-1 overflow-y-auto p-6 no-scrollbar"><div id="appstore-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
    </div>
    <div id="app-template-settings" class="hidden h-full bg-[#02040a] text-slate-300 flex">
        <div class="w-1/3 border-r border-white/5 p-6 space-y-2" id="settings-sidebar">
            <button onclick="switchTab('info')" class="w-full text-left px-4 py-3 rounded-xl bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 text-[10px] tech-mono btn-active uppercase">系統資訊</button>
            <button onclick="switchTab('profile')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-[10px] tech-mono uppercase">帳號管理</button>
            <button onclick="switchTab('appearance')" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 transition-all text-[10px] tech-mono uppercase">外觀配色</button>
        </div>
        <div class="flex-1 p-8 overflow-y-auto no-scrollbar" id="settings-main"></div>
    </div>
</body>
</html>
